/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;
background-image:radial-gradient(circle at 20% 50%,var(--glow1),transparent 50%),radial-gradient(circle at 80% 20%,var(--glow2),transparent 50%)}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
a{color:var(--ac)}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--card-b);background:var(--panel);flex-shrink:0;gap:6px;flex-wrap:wrap;position:relative}
.title-block{display:flex;align-items:center;gap:8px}
.title-block h1{font-size:1rem;letter-spacing:.1em;font-weight:900;color:var(--text)}
.ver{font-size:50%;opacity:.5;margin-left:4px}
.site-logo{width:auto;height:18px;color:var(--ac);flex-shrink:0}
.subtitle{font-size:.68rem;color:var(--muted);letter-spacing:.05em}
.bismillah{position:absolute;left:50%;transform:translateX(-50%);font-family:'Amiri',serif;font-size:.7rem;color:var(--muted);opacity:.45;user-select:none;pointer-events:none;white-space:nowrap}
[data-theme="medina"] .bismillah,[data-theme="andalus"] .bismillah,[data-theme="ottoman"] .bismillah,[data-theme="sahara"] .bismillah{opacity:.8;font-size:.85rem;text-shadow:0 0 20px currentColor}
[data-theme="medina"] .bismillah{color:var(--gold2)}
[data-theme="andalus"] .bismillah{color:var(--gold2)}
[data-theme="ottoman"] .bismillah{color:var(--iznik2)}
[data-theme="sahara"] .bismillah{color:var(--sand2)}


.menu-toggle{display:none;background:none;border:none;font-size:1.2rem;color:var(--text);cursor:pointer;padding:4px}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lang-group,.level-group{display:flex;gap:2px}
.lang-btn,.level-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid transparent;background:var(--pill);cursor:pointer;font-size:.65rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.lang-btn.active,.level-btn.active{border-color:var(--ac);color:var(--ac);background:var(--ac-s)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--card-b);padding:8px 0;background:var(--panel)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--card-b);border-radius:4px}
.s-cat{font-size:.55rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:10px 14px 3px;opacity:.7}
.s-div{height:1px;background:var(--card-b);margin:4px 10px}
.s-item{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;font-size:.75rem;font-weight:500;border-left:3px solid transparent;transition:all .1s;color:var(--text2)}
.s-item:hover{background:var(--ac-s)}
.s-item.active{border-left-color:var(--ac);background:var(--ac-s);color:var(--text);font-weight:700}
.s-icon{font-size:.9rem;width:20px;text-align:center}
.s-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;overflow-y:auto;padding:18px;max-width:880px}

/* Cards */
.card{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px var(--shadow)}
.card-title{font-size:.85rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.card-sub{font-size:.8rem;line-height:1.6;color:var(--text2)}
.page-title{font-size:1.25rem;font-weight:900;margin-bottom:2px;letter-spacing:.04em}
.page-tag{font-size:.78rem;color:var(--muted);margin-bottom:12px;font-style:italic}

/* Buttons */
.btn{padding:7px 14px;border-radius:9px;border:1.5px solid var(--pill-b);background:var(--pill);color:var(--text);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--ac);transform:translateY(-1px)}
.btn.sm{padding:4px 9px;font-size:.68rem;border-radius:7px}
.btn.primary{background:var(--btn-bg);color:var(--btn-text);border-color:var(--btn-b)}

/* Hints */
.hint{padding:9px 12px;border-radius:9px;margin:8px 0;font-size:.76rem;line-height:1.6;border-left:3px solid;background:var(--card)}
.hint.tip{border-left-color:#22c55e}
.hint.warn{border-left-color:#f0a040}
.hint.danger{border-left-color:#f06060}

/* Code blocks */
.code{position:relative;margin:6px 0;border-radius:9px;overflow:hidden;background:rgba(0,0,0,.3);border:1px solid var(--card-b)}
.code pre{padding:10px 12px;font-size:.72rem;line-height:1.5;overflow-x:auto;font-family:'Fira Code',Consolas,monospace;color:var(--text2)}
.copy-btn{position:absolute;top:5px;right:5px;padding:3px 8px;border-radius:5px;border:1px solid var(--pill-b);background:var(--pill);color:var(--muted);font-size:.6rem;cursor:pointer;font-family:inherit}
.copy-btn:hover{color:var(--ac);border-color:var(--ac)}
[data-theme="arctic"] .code,[data-theme="blaze"] .code{background:rgba(15,23,42,.06)}

/* Accordion */
.acc{border-radius:9px;border:1px solid var(--card-b);margin-bottom:5px;overflow:hidden;background:var(--card)}
.acc-h{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600}
.acc-h:hover{background:var(--ac-s)}
.acc-arr{transition:transform .2s;font-size:.65rem;color:var(--muted)}
.acc.open .acc-arr{transform:rotate(90deg)}
.acc-b{display:none;padding:0 12px 10px;font-size:.78rem;line-height:1.6;color:var(--text2)}
.acc.open .acc-b{display:block}

/* Steps */
.steps{counter-reset:step}
.step{position:relative;padding-left:34px;margin-bottom:12px;font-size:.8rem;line-height:1.6;color:var(--text2)}
.step::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:0;width:22px;height:22px;border-radius:50%;background:var(--ac-s);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;border:1.5px solid var(--ac)}

/* Progress */
.prog-bar{height:7px;border-radius:99px;background:var(--card-b);margin:6px 0;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--btn-bg);transition:width .5s ease}

/* Level badges */
.lvl{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.55rem;font-weight:800;letter-spacing:.04em;vertical-align:middle}
.lvl.g{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.lvl.y{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3)}
.lvl.r{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}

/* Quests & Badges */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin:8px 0}
.q-card{border-radius:11px;border:1.5px solid var(--card-b);background:var(--card);padding:12px;display:flex;gap:10px;align-items:center;transition:all .15s;cursor:pointer}
.q-card.done{border-color:var(--ac);background:var(--ac-s)}
.q-icon{font-size:1.5rem;flex-shrink:0;width:36px;text-align:center}
.q-info{flex:1}
.q-name{font-size:.78rem;font-weight:700}
.q-desc{font-size:.66rem;color:var(--muted);margin-top:1px}
.q-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--card-b);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.q-card.done .q-check{background:var(--ac);border-color:var(--ac);color:#fff}
.badge-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.badge{width:64px;text-align:center;opacity:.3;transition:all .3s}
.badge.earned{opacity:1}
.badge-ico{font-size:1.8rem}
.badge-nm{font-size:.55rem;color:var(--muted);margin-top:1px;font-weight:700}

/* Entity tree */
.ent-tree{margin:6px 0}
.ent-group{margin-bottom:4px}
.ent-gh{padding:6px 10px;cursor:pointer;font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:6px;border-radius:8px;transition:background .1s}
.ent-gh:hover{background:var(--ac-s)}
.ent-gh .arr{font-size:.6rem;color:var(--muted);transition:transform .2s}
.ent-group.open .ent-gh .arr{transform:rotate(90deg)}
.ent-list{display:none;padding-left:24px}
.ent-group.open .ent-list{display:block}
.ent-row{display:flex;align-items:center;gap:8px;padding:5px 10px;font-size:.72rem;border-radius:7px;cursor:pointer;transition:background .1s}
.ent-row:hover{background:var(--ac-s)}
.ent-id{font-family:'Fira Code',Consolas,monospace;color:var(--ac);flex:1}
.ent-val{color:var(--text2);font-family:'Fira Code',Consolas,monospace;font-size:.68rem}

/* Dashboard sim cards */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:8px 0}
.dash-card{border-radius:12px;border:1.5px solid var(--card-b);background:var(--card);padding:14px;transition:all .15s;cursor:pointer}
.dash-card:hover{border-color:var(--ac);transform:translateY(-1px)}
.dash-card .dc-icon{font-size:1.6rem;margin-bottom:6px}
.dash-card .dc-name{font-size:.8rem;font-weight:700}
.dash-card .dc-state{font-size:.72rem;color:var(--muted);margin-top:2px}

/* Gauge */
.gauge-wrap{width:100px;height:60px;position:relative;margin:6px auto}
.gauge-bg{fill:none;stroke:var(--card-b);stroke-width:8}
.gauge-fill{fill:none;stroke:var(--ac);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.gauge-val{font-size:.9rem;font-weight:800;fill:var(--text);text-anchor:middle}
.gauge-unit{font-size:.5rem;fill:var(--muted);text-anchor:middle}

/* Automation builder */
.auto-flow{display:flex;gap:8px;align-items:stretch;margin:8px 0;flex-wrap:wrap}
.auto-col{flex:1;min-width:180px;border-radius:11px;border:1.5px solid var(--card-b);background:var(--card);padding:12px}
.auto-col-title{font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.auto-arrow{font-size:1.2rem;color:var(--muted);display:flex;align-items:center;flex-shrink:0}
.auto-option{padding:6px 10px;border-radius:7px;border:1px solid var(--card-b);margin-bottom:4px;font-size:.72rem;cursor:pointer;transition:all .12s}
.auto-option:hover{border-color:var(--ac);background:var(--ac-s)}
.auto-option.selected{border-color:var(--ac);background:var(--ac-s);color:var(--ac);font-weight:700}
.auto-config{margin-top:6px;padding:8px;border-radius:7px;background:var(--input);font-size:.7rem}
.auto-config select,.auto-config input{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--pill-b);background:var(--input);color:var(--text);font-size:.7rem;margin-top:3px;font-family:inherit}

/* YAML editor */
.yaml-split{display:flex;gap:8px;margin:8px 0;min-height:200px}
.yaml-edit{flex:1;min-width:0}
.yaml-edit textarea{width:100%;height:200px;padding:10px;border-radius:9px;border:1.5px solid var(--card-b);background:var(--input);color:var(--text);font-family:'Fira Code',Consolas,monospace;font-size:.72rem;line-height:1.5;resize:vertical}
.yaml-edit textarea:focus{outline:none;border-color:var(--ac)}
.yaml-edit textarea.valid{border-color:#22c55e}
.yaml-edit textarea.invalid{border-color:#ef4444}
.yaml-preview{flex:1;min-width:0;border-radius:9px;border:1px solid var(--card-b);background:var(--card);padding:10px;font-size:.72rem;overflow:auto}
.yaml-err{color:#ef4444;font-size:.68rem;margin-top:4px;font-family:'Fira Code',Consolas,monospace}
.yaml-ok{color:#22c55e;font-size:.68rem;margin-top:4px}

/* MQTT playground */
.mqtt-split{display:flex;gap:8px;margin:8px 0}
.mqtt-panel{flex:1;border-radius:11px;border:1.5px solid var(--card-b);background:var(--card);padding:12px}
.mqtt-title{font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mqtt-input{width:100%;padding:6px 10px;border-radius:7px;border:1px solid var(--pill-b);background:var(--input);color:var(--text);font-size:.72rem;margin-bottom:4px;font-family:inherit}
.mqtt-log{max-height:150px;overflow-y:auto;font-family:'Fira Code',Consolas,monospace;font-size:.65rem;line-height:1.5;color:var(--text2)}
.mqtt-msg{padding:3px 6px;border-radius:4px;margin-bottom:2px;background:var(--ac-s)}

/* Network map */
.net-map{position:relative;background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:20px;min-height:250px;margin:8px 0;overflow:hidden}
.net-node{position:absolute;text-align:center;cursor:pointer;transition:transform .15s}
.net-node:hover{transform:scale(1.1)}
.net-node-ico{font-size:1.5rem}
.net-node-name{font-size:.6rem;font-weight:700;color:var(--text);margin-top:2px}
.net-node-ip{font-size:.55rem;color:var(--muted);font-family:'Fira Code',Consolas,monospace}
.net-line{position:absolute;height:2px;background:var(--card-b);transform-origin:left center}

/* Tabs */
.tabs{display:flex;gap:3px;margin:8px 0;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px 8px 0 0;border:1px solid var(--card-b);border-bottom:none;background:var(--pill);color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit}
.tab.active{background:var(--card);color:var(--ac);border-color:var(--ac)}
.tab-body{border:1px solid var(--card-b);border-radius:0 0 10px 10px;background:var(--card);padding:12px;margin-top:-1px}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Mobile */
.m-bar{display:none;overflow-x:auto;padding:5px 8px;gap:5px;border-top:1px solid var(--card-b);background:var(--panel);flex-shrink:0}
.m-pill{white-space:nowrap;padding:5px 10px;border-radius:99px;border:1px solid var(--pill-b);background:var(--pill);color:var(--muted);font-size:.66rem;font-weight:600;cursor:pointer;font-family:inherit}
.m-pill.active{background:var(--ac-s);border-color:var(--ac);color:var(--ac)}

/* RTL */
[dir="rtl"] .s-item{border-left:none;border-right:3px solid transparent}
[dir="rtl"] .s-item.active{border-right-color:var(--ac)}
[dir="rtl"] .sidebar{border-right:none;border-left:1px solid var(--card-b)}
[dir="rtl"] .hint{border-left:none;border-right:3px solid}
[dir="rtl"] .step{padding-left:0;padding-right:34px}
[dir="rtl"] .step::before{left:auto;right:0}
[dir="rtl"] .ent-list{padding-left:0;padding-right:24px}

/* Responsive */
@media(max-width:768px){
.sidebar{display:none;position:fixed;top:0;left:0;bottom:0;z-index:800;width:250px;box-shadow:4px 0 20px rgba(0,0,0,.5)}
.sidebar.open{display:block}
.menu-toggle{display:block}
.m-bar{display:flex}
.main{padding:12px;max-width:100%}
.auto-flow{flex-direction:column}
.yaml-split{flex-direction:column}
.mqtt-split{flex-direction:column}
.grid-2,.grid-3{grid-template-columns:1fr}
.dash-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
.dash-grid{grid-template-columns:1fr}
}

/* Scrollbar global */
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--card-b);border-radius:4px}

/* ============================================================
   THEME INDICATOR BUTTON
   ============================================================ */
.theme-indicator{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;
border:1.5px solid var(--pill-b);background:var(--pill);cursor:pointer;font-family:inherit;transition:all .15s}
.theme-indicator:hover{border-color:var(--ac)}
.th-swatch{width:12px;height:12px;border-radius:50%;background:var(--ac);border:1.5px solid rgba(255,255,255,.2);flex-shrink:0}
.th-name{font-size:.68rem;font-weight:700;color:var(--text)}
.th-arrow{font-size:.55rem;color:var(--muted)}

/* ============================================================
   THEME CHOOSER MODAL
   ============================================================ */
.tc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;
align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.tc-overlay.open{display:flex}
.tc-modal{width:min(520px,90vw);max-height:85vh;overflow-y:auto;border-radius:16px;
background:var(--panel);border:1.5px solid var(--card-b);box-shadow:0 20px 60px var(--shadow);padding:0}
.tc-tabs{display:flex;border-bottom:1px solid var(--card-b)}
.tc-tab{flex:1;padding:12px;text-align:center;font-size:.78rem;font-weight:700;cursor:pointer;
border:none;background:none;color:var(--muted);font-family:inherit;transition:all .15s;
border-bottom:2px solid transparent}
.tc-tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tc-tab:hover{background:var(--ac-s)}
.tc-panel{padding:14px}
.tc-bismillah{text-align:center;font-family:'Amiri',serif;font-size:1.1rem;color:var(--ac);opacity:.6;
padding:6px 0 10px;user-select:none}
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.tc-card{border-radius:10px;border:2px solid var(--card-b);padding:10px;cursor:pointer;
transition:all .18s;text-align:center;position:relative;overflow:hidden}
.tc-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow)}
.tc-card.active{border-color:var(--ac);box-shadow:0 0 15px var(--ac-s)}
.tc-card.active::after{content:'✓';position:absolute;top:5px;right:7px;font-size:.6rem;
font-weight:900;color:var(--ac)}
.tc-swatch{height:32px;border-radius:6px;margin-bottom:6px;position:relative;overflow:hidden}
.tc-swatch-inner{position:absolute;inset:0;display:flex}
.tc-sw-bg{flex:3}
.tc-sw-ac{flex:1}
.tc-sw-ac2{flex:1}
.tc-emoji{font-size:1rem;margin-bottom:2px}
.tc-tname{font-size:.72rem;font-weight:700;color:var(--text)}
.tc-tdesc{font-size:.58rem;color:var(--muted);margin-top:1px}

/* Islamic tab special styling */
.tc-islamic .tc-card{border-radius:4px 4px 12px 12px}
.tc-islamic .tc-swatch{border-radius:4px 4px 8px 8px}

/* ============================================================
   ISLAMIC STRUCTURAL REVOLUTION
   Shared rules for ALL Islamic themes
   ============================================================ */
.islamic-active .card{
border-radius:4px 4px 14px 14px!important;position:relative;overflow:visible;
padding:18px!important;border-width:1.5px!important}
.islamic-active .card::before{
content:'';position:absolute;top:-1px;left:8%;right:8%;height:3px;

border-radius:0 0 4px 4px;pointer-events:none}
.islamic-active .card::after{
content:'';position:absolute;bottom:6px;left:15%;right:15%;height:1px;
background:linear-gradient(90deg,transparent,var(--card-b),transparent);pointer-events:none}

/* Arched dashboard cards */
.islamic-active .dash-card{
border-radius:4px 4px 16px 16px!important;padding:16px!important;
border-width:1.5px!important;position:relative}
.islamic-active .dash-card::before{
content:'';position:absolute;top:0;left:12%;right:12%;height:2px;
background:linear-gradient(90deg,transparent,var(--ac),transparent);pointer-events:none}
.islamic-active .dash-card:hover{box-shadow:0 6px 25px var(--shadow),0 0 20px var(--ac-s)}

/* Islamic header — ornamental band */
.islamic-active .header{position:relative;padding-bottom:12px}
.islamic-active .header::after{
position:absolute;bottom:-1px;left:0;right:0;height:12px;
display:flex;align-items:center;justify-content:center;
font-size:.4rem;letter-spacing:4px;pointer-events:none;z-index:1;
background:linear-gradient(180deg,transparent,var(--panel))}

/* Bismillah medallion */
.islamic-active .bismillah{
font-size:.95rem!important;opacity:.85!important;
background:radial-gradient(circle,var(--ac-s),transparent 70%);
padding:2px 18px;border-radius:50%;
text-shadow:0 0 20px var(--ac-s)}

/* Sidebar — ornamental */
.islamic-active .s-cat{font-family:'Reem Kufi','Amiri',serif!important;letter-spacing:.18em!important}
.islamic-active .s-div{background:linear-gradient(90deg,transparent,var(--ac-s),transparent)!important;margin:8px 14px!important;position:relative}
.islamic-active .s-item{font-family:'Amiri',serif!important;font-size:.8rem!important}
.islamic-active .s-item.active{
background:linear-gradient(90deg,var(--ac-s),transparent)!important}

/* Page titles — calligraphic + ornamental underline */
.islamic-active .page-title{
font-family:'Reem Kufi','Amiri',serif!important;font-size:1.35rem!important;
letter-spacing:.05em;padding-bottom:10px!important;margin-bottom:8px!important;
border-bottom:1px solid transparent!important;position:relative}
.islamic-active .page-title::after{
content:'✦';display:block;text-align:center;font-size:.45rem;
color:var(--ac);opacity:.5;margin-top:6px}
.islamic-active .page-tag{font-family:'Amiri',serif!important;font-style:italic}

/* Card titles */
.islamic-active .card-title{font-family:'Reem Kufi','Amiri',serif!important;font-size:.9rem!important}
.islamic-active .dc-name{font-family:'Reem Kufi','Amiri',serif!important}
.islamic-active .q-name{font-family:'Reem Kufi','Amiri',serif!important}
.islamic-active th{font-family:'Reem Kufi','Amiri',serif!important}
.islamic-active .auto-col-title{font-family:'Reem Kufi','Amiri',serif!important}
.islamic-active .mqtt-title{font-family:'Reem Kufi','Amiri',serif!important}
.islamic-active .net-node-name{font-family:'Reem Kufi','Amiri',serif!important}

/* Other text */
.islamic-active .acc-h{font-family:'Amiri',serif!important}
.islamic-active .btn{font-family:'Amiri',serif!important;border-radius:6px!important}
.islamic-active .tab{font-family:'Amiri',serif!important;border-radius:4px 4px 0 0!important}
.islamic-active .ent-gh{font-family:'Amiri',serif!important}

/* Islamic code blocks */
.islamic-active .code{border-radius:4px 4px 10px 10px!important}
.islamic-active .acc{border-radius:4px 4px 10px 10px!important}
.islamic-active .auto-col{border-radius:4px 4px 12px 12px!important}
.islamic-active .mqtt-panel{border-radius:4px 4px 12px 12px!important}
.islamic-active .q-card{border-radius:4px 4px 12px 12px!important}
.islamic-active .hint{border-radius:4px 12px 12px 4px!important}

/* Islamic quest done */
.islamic-active .q-card.done{border-color:var(--ac)!important;background:var(--ac-s)!important}
.islamic-active .badge.earned{filter:drop-shadow(0 0 8px var(--ac-s))}
.islamic-active .prog-fill{background:linear-gradient(90deg,var(--border),var(--ac),var(--ac-st),var(--ac),var(--border))!important}

/* Breathing room */
.islamic-active .card+.card{margin-top:12px}
.islamic-active .dash-grid{gap:12px!important}

function entTree(){
    let groups={};
    for(let id in ENT){
        let e=ENT[id];
        let d=e.domain;
        if(!groups[d])groups[d]={icon:e.icon,entities:[]};
        groups[d].entities.push({id,e});
    }
    let html='<div class="ent-tree">';
    for(let d in groups){
        let g=groups[d];
        html+='<div class="ent-group"><div class="ent-gh" onclick="toggleEntGroup(this)"><span class="arr">▶</span> '+g.icon+' '+d+' ('+g.entities.length+')</div><div class="ent-list">';
        g.entities.forEach(({id,e})=>{
            let val=typeof e.state==='number'?(e.state+' '+e.unit):e.state;
            html+='<div class="ent-row" onclick="toggleEntity(\''+id+'\')"><span class="ent-id">'+id+'</span><span class="ent-val">'+val+'</span></div>';
        });
        html+='</div></div>';
    }
    html+='</div>';
    return html;
}

function dashCard(id){
    let e=ENT[id];if(!e)return'';
    let val=typeof e.state==='number'?(e.state+' '+(e.unit||'')):e.state;
    let stateColor=e.state==='on'||e.state==='playing'?'var(--ac)':e.state==='off'||e.state==='paused'?'var(--muted)':'var(--text2)';
    let html='<div class="dash-card" onclick="toggleEntity(\''+id+'\')">';
    html+='<div class="dc-icon">'+e.icon+'</div>';
    html+='<div class="dc-name">'+e.name+'</div>';
    html+='<div class="dc-state" style="color:'+stateColor+'">'+val+'</div>';
    if(e.domain==='light'&&e.state==='on'){
        html+='<div style="width:100%;height:4px;border-radius:2px;margin-top:6px;background:'+e.color+'"></div>';
    }
    if(e.domain==='sensor'&&typeof e.state==='number'){
        html+=miniGauge(e.state,e.unit);
    }
    html+='</div>';
    return html;
}

function miniGauge(val,unit){
    let pct=Math.min(100,Math.max(0,unit==='°C'?(val/50)*100:unit==='%'?val:unit==='hPa'?((val-950)/100)*100:(val/1000)*100));
    let r=45,cx=50,cy=55,startAngle=Math.PI,endAngle=0;
    let range=Math.PI;
    let angle=startAngle-range*(pct/100);
    let x1=cx+r*Math.cos(startAngle),y1=cy-r*Math.sin(startAngle);
    let x2=cx+r*Math.cos(angle),y2=cy-r*Math.sin(angle);
    let large=pct>50?1:0;
    return'<svg viewBox="0 0 100 60" width="80" style="margin:4px auto;display:block"><path d="M'+x1+' '+y1+' A '+r+' '+r+' 0 0 1 '+(cx+r*Math.cos(endAngle))+' '+(cy-r*Math.sin(endAngle))+'" class="gauge-bg"/><path d="M'+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+'" class="gauge-fill"/><text x="'+cx+'" y="'+cy+'" class="gauge-val">'+Math.round(val)+'</text><text x="'+cx+'" y="'+(cy+10)+'" class="gauge-unit">'+unit+'</text></svg>';
}

/* ============================================================

   ============================================================ */
function pgYamlBasics(){
    let h='<div class="page-title">📐 '+t('yamlbasics')+'</div><div class="page-tag">The language HA speaks. Learn it once, use it everywhere.</div>';

    h+='<div class="card"><div class="card-title">📝 What is YAML?</div><div class="card-sub">';
    h+='YAML is a simple config file format. It\'s how you tell Home Assistant what to do. It uses <b>indentation</b> (spaces, never tabs) to show structure.';
    h+='</div></div>';

    h+='<div class="card"><div class="card-title">🔑 Key-Value Pairs</div><div class="card-sub">Left = key, right = value, colon in between.';
    h+=codeBlock('name: My Bedroom Light\nplatform: esphome\nbrightness: 80');
    h+='</div></div>';

    h+='<div class="card"><div class="card-title">📋 Lists</div><div class="card-sub">Dash + space = one item in a list.';
    h+=codeBlock('effects:\n  - Strobe\n  - Color Loop\n  - Fire');
    h+='</div></div>';

    h+='<div class="card"><div class="card-title">📦 Nesting</div><div class="card-sub">Indent 2 spaces to nest. Parent → child.';
    h+=codeBlock('automation:\n  trigger:\n    platform: state\n    entity_id: binary_sensor.door\n    to: "open"\n  action:\n    service: notify.mobile_app\n    data:\n      message: "Door opened!"');
    h+='</div></div>';

    h+='<div class="card"><div class="card-title">⚠️ Common Mistakes</div><div class="card-sub">';
    h+='<b>Tab vs Space</b> — YAML only accepts spaces. One tab = broken file.<br>';
    h+='<b>Missing colon</b> — <code>name My Light</code> should be <code>name: My Light</code><br>';
    h+='<b>Wrong indent</b> — Every level = 2 spaces. Not 1, not 3, not 4.<br>';
    h+='<b>Forgetting quotes</b> — Strings with <code>:</code> or <code>#</code> need quotes.';
    h+='</div></div>';
    return h;
}

function mqttPub(){
    let topic=document.getElementById('mqttTopic').value;
    let msg=document.getElementById('mqttMsg').value;
    if(!topic)return;
    mqttLog.unshift({topic,msg});
    if(mqttLog.length>20)mqttLog.pop();
    let log=document.getElementById('mqttLog');
    log.innerHTML='';
    mqttLog.forEach(m=>{log.innerHTML+='<div class="mqtt-msg">'+esc(m.topic)+' → '+esc(m.msg)+'</div>'});
}

    h+='<div class="yaml-preview" id="yamlPreview"><pre>'+esc(templates[0].yaml)+'</pre></div>';

    h+='<script>window._yamlTemplates='+JSON.stringify(templates.map(t=>t.yaml))+'<\/script>';

function loadYamlTemplate(i){
    let templates=window._yamlTemplates;
    if(!templates||!templates[i])return;
    let ed=document.getElementById('yamlEditor');
    if(ed){ed.value=templates[i];validateYaml()}
}

function validateYaml(){
    let ed=document.getElementById('yamlEditor');
    let status=document.getElementById('yamlStatus');
    let preview=document.getElementById('yamlPreview');
    if(!ed||!status||!preview)return;
    let val=ed.value;
    // Basic YAML validation
    let errors=[];
    let lines=val.split('\n');
    lines.forEach((line,i)=>{
        if(line.includes('\t'))errors.push('Line '+(i+1)+': Tab detected — use spaces only');
        if(line.trim()&&!line.trim().startsWith('#')&&!line.trim().startsWith('-')&&line.trim().includes(':')&&line.match(/^\s*\S+[^:]+$/)){}
    });
    if(errors.length){
        ed.classList.remove('valid');ed.classList.add('invalid');
        status.className='yaml-err';status.textContent='❌ '+errors[0];
    }else{
        ed.classList.remove('invalid');ed.classList.add('valid');
        status.className='yaml-ok';status.textContent='✅ Valid YAML';
    }
    preview.innerHTML='<pre>'+esc(val)+'</pre>';
}

    h+='<div class="card"><div class="card-title">📖 Glossary</div><div class="card-sub">';

    h+='<b>Service</b> — action to perform (light.turn_on, notify.send)<br>';
    h+='<b>Automation</b> — "when X happens, do Y"<br>';
    h+='<b>Scene</b> — saved states of multiple devices<br>';
    h+='<b>Script</b> — sequence of actions, manually triggered<br>';
    h+='<b>Integration</b> — connection to a device or service<br>';
    h+='<b>Add-on</b> — extra software running alongside HA<br>';
    h+='<b>Lovelace</b> — HA\'s dashboard system<br>';
    h+='<b>YAML</b> — config file format HA uses<br>';
    h+='<b>Jinja2</b> — template language for dynamic values<br>';
    h+='<b>mDNS</b> — auto-discovery on local network (.local addresses)';
